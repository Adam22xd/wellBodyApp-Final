services:
  - type: web
    name: well-body-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run prisma:generate
    startCommand: npm run server:start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: well-body-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: well-body-app
    runtime: static
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: well-body-db
    plan: free
